<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Turbo Tech Engineers - Product Search</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f9;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px 15px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    color:#0056b3;
    font-size:34px;
}

.header p{
    color:#666;
    margin-top:8px;
}

#search{

    width:100%;
    padding:16px 20px;

    border-radius:40px;

    border:2px solid #0056b3;

    font-size:18px;

    outline:none;

}

#search:focus{

    box-shadow:0 0 12px rgba(0,86,179,.25);

}

#results{

    margin-top:30px;

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

    gap:20px;

}

.card{

    background:white;

    border-radius:12px;

    padding:20px;

    box-shadow:0 3px 12px rgba(0,0,0,.12);

    transition:.25s;

}

.card:hover{

    transform:translateY(-5px);

}

.card h3{

    color:#0056b3;

    margin-bottom:12px;

}

.row{

    margin:6px 0;

}

.label{

    font-weight:bold;

}

.loading{

    text-align:center;

    font-size:20px;

    color:#666;

}

.no-result{

    text-align:center;

    font-size:20px;

    color:red;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Turbo Tech Engineers</h1>

<p>Instant Product Search</p>

</div>

<input
id="search"
type="text"
placeholder="Search Part Number, Customer, Engine..."
autocomplete="off"
>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>

</html>
